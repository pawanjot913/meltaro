# Nginx Configuration for Meltaro
# ---------------------------------
# Handles:
#   - HTTPS termination with Let's Encrypt certificates
#   - HTTP → HTTPS redirect
#   - Reverse proxy to Node.js API (port 5000)
#   - Serving the frontend static build (dist/)
#   - Security headers
#   - Gzip compression
#   - Cache-Control for static assets
#
# Prerequisites:
#   1. Install certbot: apt install certbot python3-certbot-nginx
#   2. Obtain certificate: certbot --nginx -d yourdomain.com
#   3. Replace "yourdomain.com" below with your actual domain
#   4. Copy this file to /etc/nginx/sites-available/meltaro
#   5. ln -s /etc/nginx/sites-available/meltaro /etc/nginx/sites-enabled/
#   6. nginx -t && systemctl reload nginx

# Rate limiting zone — shared across all workers, 10 MB store (~160k IPs)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

# ── HTTP — redirect everything to HTTPS ──────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS certificates (managed by certbot) ────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip compression ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # ── API — proxy to Express backend ───────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Tighter rate limit on login endpoint
    location /api/auth/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend static files ────────────────────────────────────────
    root /var/www/meltaro/frontend/dist;
    index index.html;

    # Hashed asset files (JS, CSS) — cache for 1 year
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html — never cache so users always get the latest deploy
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Health check — useful for load balancer probes
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
        access_log off;
    }

    # Block access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Limit request body size to match Express (10kb)
    client_max_body_size 10k;
}
