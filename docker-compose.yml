# Docker Compose — Production Setup
# -----------------------------------
# Runs backend + frontend as separate containers.
# For local testing: docker compose up --build
# For production: use docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Note: In real production you'd also put Nginx or a cloud load balancer
# in front of both services for TLS termination. The nginx/ config in
# this repo is for a VPS deployment without Docker.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: meltaro-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      # ⚠️  Never commit real secrets here — use a .env file or secrets manager
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/logs
    volumes:
      # Persist logs outside the container so they survive restarts
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - meltaro_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        # Backend URL as seen from the browser (not from inside Docker)
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: meltaro-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - meltaro_network

volumes:
  backend_logs:

networks:
  meltaro_network:
    driver: bridge
